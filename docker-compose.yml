version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - services/backend/.env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
